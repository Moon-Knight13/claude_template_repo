name: semgrep

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run semgrep
        shell: bash
        run: |
          set -euo pipefail
          # HOME=/tmp gives the non-root container user a writable home; without it
          # semgrep tries to create /.semgrep and fails with a PermissionError.
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "${{ github.workspace }}:/src" \
            semgrep/semgrep@sha256:c98edb09ae3abcc870171df7446fd2df8426a6a7f6ff14ca1ac47f4a25bf1666 \
            semgrep scan \
              --config /src/.semgrep.yml \
              --config p/secrets \
              --config p/security-audit \
              --error \
              --metrics=off \
              --sarif \
              --output /src/semgrep.sarif \
              /src

      - name: Upload SARIF to GitHub Security tab
        if: ${{ always() && hashFiles('semgrep.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357
        with:
          sarif_file: semgrep.sarif
