name: container-scan

on:
  pull_request:
    paths:
      - ".devcontainer/**"
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: container-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Build devcontainer image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --file .devcontainer/Dockerfile \
            --build-arg CLAUDE_CODE_VERSION=latest \
            --tag devcontainer-scan:${{ github.sha }} \
            .

      # Report step: capture CRITICAL+HIGH for visibility in the Security tab.
      # exit-code 0 so this step never fails the job — the gate step below decides.
      - name: Trivy scan (report CRITICAL+HIGH to Security tab)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: devcontainer-scan:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        if: ${{ always() && hashFiles('trivy.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357
        with:
          sarif_file: trivy.sarif

      # Gate step: the devcontainer is a local dev sandbox (not a shipped
      # artifact) behind a deny-by-default firewall, so we block only on
      # CRITICAL findings. HIGHs are still reported above for visibility.
      # Base-image OS CVEs are cleared by `apt-get upgrade` in the Dockerfile.
      - name: Trivy gate (fail on CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: devcontainer-scan:${{ github.sha }}
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
